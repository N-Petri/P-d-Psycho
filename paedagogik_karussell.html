<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pädagogik-Karussell – Prüfungsvorbereitung</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #161618;
  --surface2: #1e1e22;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --text: #e8e4d9;
  --muted: #7d7a72;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.15);
  --accent-border: rgba(200,169,110,0.35);

  --s1: #a78bfa; --s1d: rgba(167,139,250,0.12); --s1b: rgba(167,139,250,0.3);
  --s2: #60a5fa; --s2d: rgba(96,165,250,0.12); --s2b: rgba(96,165,250,0.3);
  --s3: #34d399; --s3d: rgba(52,211,153,0.12); --s3b: rgba(52,211,153,0.3);
  --s4: #60a5fa; --s4d: rgba(96,165,250,0.12); --s4b: rgba(96,165,250,0.3);
  --s5: #a78bfa; --s5d: rgba(167,139,250,0.12); --s5b: rgba(167,139,250,0.3);
  --s6: #f87171; --s6d: rgba(248,113,113,0.12); --s6b: rgba(248,113,113,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Lora', serif;
  font-size: 17px;
  color: var(--accent);
  letter-spacing: 0.01em;
}
.logo span { color: var(--muted); font-weight: 400; font-style: italic; }
.header-right { display: flex; align-items: center; gap: 16px; }
.timer-btn {
  background: none;
  border: 1px solid var(--border-strong);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}
.timer-btn:hover { border-color: var(--accent-border); color: var(--accent); }
.timer-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
#timer-display { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--accent); min-width: 60px; text-align: right; }

/* ── LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
}

/* ── SIDEBAR ── */
aside {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 61px;
  height: calc(100vh - 61px);
  overflow-y: auto;
}
.sidebar-title {
  padding: 20px 20px 12px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}
.station-nav { list-style: none; padding: 0 10px 20px; }
.station-nav li {
  margin-bottom: 4px;
}
.station-btn {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background 0.15s;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  line-height: 1.35;
}
.station-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.station-btn.active { background: var(--accent-dim); color: var(--accent); }
.station-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid;
  margin-top: 1px;
  flex-shrink: 0;
  font-weight: 500;
}
.station-btn[data-s="1"] .station-num { border-color: var(--s1b); color: var(--s1); background: var(--s1d); }
.station-btn[data-s="2"] .station-num { border-color: var(--s2b); color: var(--s2); background: var(--s2d); }
.station-btn[data-s="3"] .station-num { border-color: var(--s3b); color: var(--s3); background: var(--s3d); }
.station-btn[data-s="4"] .station-num { border-color: var(--s4b); color: var(--s4); background: var(--s4d); }
.station-btn[data-s="5"] .station-num { border-color: var(--s5b); color: var(--s5); background: var(--s5d); }
.station-btn[data-s="6"] .station-num { border-color: var(--s6b); color: var(--s6); background: var(--s6d); }
.station-btn.active[data-s="1"] { background: var(--s1d); color: var(--s1); }
.station-btn.active[data-s="2"] { background: var(--s2d); color: var(--s2); }
.station-btn.active[data-s="3"] { background: var(--s3d); color: var(--s3); }
.station-btn.active[data-s="4"] { background: var(--s4d); color: var(--s4); }
.station-btn.active[data-s="5"] { background: var(--s5d); color: var(--s5); }
.station-btn.active[data-s="6"] { background: var(--s6d); color: var(--s6); }

.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 8px 10px 16px; }
.sidebar-mini-title {
  padding: 0 20px 10px;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}
.question-nav { list-style: none; padding: 0 10px 16px; }
.question-nav li { margin-bottom: 3px; }
.q-btn {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  line-height: 1.4;
  transition: all 0.15s;
}
.q-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }

/* ── MAIN ── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px 80px;
  max-width: 860px;
}

/* ── STATION HEADER ── */
.station-header {
  margin-bottom: 36px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.station-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
  margin-bottom: 14px;
}
.station-title {
  font-family: 'Lora', serif;
  font-size: 30px;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 10px;
}
.station-subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}
.station-subtitle em { color: var(--accent); font-style: normal; font-weight: 500; }

/* ── EINSTIEG BANNER ── */
.einstieg-banner {
  border: 1px solid var(--accent-border);
  background: var(--accent-dim);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 13.5px;
  color: var(--accent);
  margin-bottom: 32px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.einstieg-banner .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* ── SECTION ── */
.section { margin-bottom: 40px; }
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ── THEORY CARDS ── */
.theory-grid { display: flex; flex-direction: column; gap: 12px; }
.theory-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.2s;
}
.theory-card:hover { border-color: var(--border-strong); }
.theory-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  gap: 12px;
}
.theory-card-header:hover { background: rgba(255,255,255,0.02); }
.theory-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.theorist-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
  flex-shrink: 0;
}
.theory-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.theory-key {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toggle-icon {
  font-size: 18px;
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
  line-height: 1;
}
.theory-card.open .toggle-icon { transform: rotate(45deg); }
.theory-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}
.theory-card.open .theory-body { display: block; }
.theory-body ul {
  list-style: none;
  padding: 12px 0 0;
}
.theory-body ul li {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text);
  padding: 5px 0 5px 16px;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.theory-body ul li:last-child { border-bottom: none; }
.theory-body ul li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--muted);
  font-size: 11px;
}
.theory-body ul li strong { color: var(--accent); font-weight: 500; }
.theory-body ul li em { color: var(--muted); font-style: italic; }

/* ── STEP CARD (Palzkill) ── */
.steps { display: flex; flex-direction: column; gap: 8px; }
.step {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 9px;
  background: var(--surface);
  transition: border-color 0.2s;
}
.step:hover { border-color: var(--border-strong); }
.step-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: 5px;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.step-content { flex: 1; }
.step-title { font-size: 13.5px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.step-desc { font-size: 12.5px; color: var(--muted); line-height: 1.6; }
.step-desc strong { color: var(--text); }
.step-example {
  margin-top: 8px;
  padding: 8px 12px;
  background: var(--surface2);
  border-radius: 6px;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  border-left: 2px solid var(--accent-border);
}

/* ── TABLE ── */
.info-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 4px;
}
.info-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  border-bottom: 1px solid var(--border);
}
.info-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  line-height: 1.55;
  vertical-align: top;
}
.info-table tr:last-child td { border-bottom: none; }
.info-table td:first-child { color: var(--accent); font-weight: 500; white-space: nowrap; }
.info-table td:nth-child(2) { color: var(--text); }
.info-table td:nth-child(3) { color: var(--muted); font-size: 12px; }
.table-wrap {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
}

/* ── QUOTE ── */
.quote-block {
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  background: var(--surface);
  margin: 14px 0;
}
.quote-block blockquote {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
}
.quote-block cite {
  display: block;
  margin-top: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  font-style: normal;
}

/* ── FORMULATION BOX ── */
.formulation {
  background: var(--surface2);
  border: 1px solid var(--accent-border);
  border-radius: 10px;
  padding: 20px;
  margin-top: 10px;
}
.formulation-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.formulation p {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
}

/* ── CONNECTION CARDS ── */
.connections { display: flex; gap: 10px; margin-top: 4px; }
.conn-card {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  background: var(--surface);
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--muted);
}
.conn-card strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 13px; }

/* ── NAV FOOTER ── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.nav-arrow {
  background: none;
  border: 1px solid var(--border-strong);
  color: var(--muted);
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-arrow:hover { border-color: var(--accent-border); color: var(--accent); }
.nav-arrow:disabled { opacity: 0.3; cursor: default; }
.nav-dots { display: flex; gap: 6px; }
.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-strong);
  cursor: pointer;
  transition: all 0.2s;
}
.nav-dot.active { background: var(--accent); transform: scale(1.3); }

/* ── OVERVIEW PAGE ── */
.overview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 36px;
}
.overview-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
}
.overview-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
.ov-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ov-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid;
}
.ov-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
.ov-authors { font-size: 12px; color: var(--muted); line-height: 1.5; }
.carousel-hint {
  text-align: center;
  padding: 32px;
  border: 1px dashed var(--border-strong);
  border-radius: 12px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}
.carousel-hint strong { color: var(--text); display: block; margin-bottom: 8px; font-size: 16px; font-family: 'Lora', serif; font-style: italic; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 760px) {
  aside { display: none; }
  main { padding: 24px 20px 60px; }
  .overview-grid { grid-template-columns: 1fr; }
  .connections { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Pädagogik<span> · Prüfungskarussell</span></div>
  <div class="header-right">
    <div id="timer-display">10:00</div>
    <button class="timer-btn" id="timer-btn" onclick="toggleTimer()">⏱ Timer</button>
  </div>
</header>

<div class="layout">
<aside>
  <div class="sidebar-title">Stationen</div>
  <ul class="station-nav">
    <li><button class="station-btn" data-s="0" onclick="goTo(0)"><span class="station-num">●</span><span>Übersicht & Karussell</span></button></li>
    <li><button class="station-btn" data-s="1" onclick="goTo(1)"><span class="station-num">①</span><span>Gesprächseinstieg</span></button></li>
    <li><button class="station-btn" data-s="2" onclick="goTo(2)"><span class="station-num">②</span><span>Diagnose & Gespräch</span></button></li>
    <li><button class="station-btn" data-s="3" onclick="goTo(3)"><span class="station-num">③</span><span>Klassendynamik</span></button></li>
    <li><button class="station-btn" data-s="4" onclick="goTo(4)"><span class="station-num">④</span><span>Unterricht anpassen</span></button></li>
    <li><button class="station-btn" data-s="5" onclick="goTo(5)"><span class="station-num">⑤</span><span>Mündigkeit & Werte</span></button></li>
    <li><button class="station-btn" data-s="6" onclick="goTo(6)"><span class="station-num">⑥</span><span>System. Vernetzung</span></button></li>
  </ul>
  <hr class="sidebar-divider">
  <div class="sidebar-mini-title">Einstiegsfragen</div>
  <ul class="question-nav">
    <li><button class="q-btn" onclick="goTo(1)">„Was sagen Sie zuerst?"</button></li>
    <li><button class="q-btn" onclick="goTo(2)">„Was bedeutet die Beziehung?"</button></li>
    <li><button class="q-btn" onclick="goTo(3)">„Welche Rolle spielt die Klasse?"</button></li>
    <li><button class="q-btn" onclick="goTo(4)">„Was ändern Sie im Unterricht?"</button></li>
    <li><button class="q-btn" onclick="goTo(5)">„Was ist das Ziel? Was ist Bildung?"</button></li>
    <li><button class="q-btn" onclick="goTo(6)">„Wen beziehen Sie ein?"</button></li>
  </ul>
</aside>

<main id="main-content"></main>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const STATIONS = [
  // 0: Overview
  {
    id: 0, tag: '● Karussell', color: 'var(--accent)', colorDim: 'var(--accent-dim)', colorBorder: 'var(--accent-border)',
  },
  // 1
  {
    id: 1, tag: '① Grundlagen Pädagogik', color: 'var(--s1)', colorDim: 'var(--s1d)', colorBorder: 'var(--s1b)',
    title: 'Gesprächseinstieg',
    subtitle: 'Einstiegsfrage: <em>„Was würden Sie im Gespräch zuerst zum Schüler sagen?"</em>',
    einstieg: '⭐ Klassischer Prüfungs-Einstieg – hier beginnt das Karussell. Antwort: Ich schaffe zunächst einen geschützten Rahmen und trete dem Schüler mit echter Haltung entgegen – bevor ich spreche, entscheide ich, wie ich bin.',
    theories: [
      {
        author: 'Rogers', life: '1902–1987', name: 'Personenzentrierter Ansatz', key: 'Grundhaltung des Gesprächs',
        color: 'var(--s1)', colorDim: 'var(--s1d)', colorBorder: 'var(--s1b)',
        points: [
          '<strong>Empathie:</strong> Die Welt des Schülers von innen verstehen – nicht bewerten, sondern nachvollziehen.',
          '<strong>Kongruenz (Echtheit):</strong> Authentisch sein; keine aufgesetzte Rolle – echtes Vertrauen entsteht nur durch Echtheit.',
          '<strong>Bedingungslose Wertschätzung:</strong> Den Schüler als Person anerkennen, unabhängig vom Verhalten – keine Zustimmung zum Fehlverhalten, sondern Anerkennung seiner Würde.',
          '<em>Praxistest:</em> Bin ich gerade ruhig und präsent genug für dieses Gespräch? Wenn nicht – kurze Pause einlegen.',
        ]
      },
      {
        author: 'Berne', life: '1910–1970', name: 'Transaktionsanalyse – Ich-Zustände', key: 'Gesprächsebene bewusst steuern',

// ── STATE ──────────────────────────────────────────────────────────────────
let current = 0;
let timerInterval = null;
let timerSeconds = 600;
let timerRunning = false;

// ── TIMER ──────────────────────────────────────────────────────────────────
function toggleTimer() {
  const btn = document.getElementById('timer-btn');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = '⏱ Timer';
    btn.classList.remove('active');
  } else {
    timerSeconds = 600;
    updateTimerDisplay();
    timerRunning = true;
    btn.textContent = '◼ Stop';
    btn.classList.add('active');
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        btn.textContent = '⏱ Timer';
        btn.classList.remove('active');
        document.getElementById('timer-display').textContent = 'Zeit!';
        document.getElementById('timer-display').style.color = 'var(--s6)';
      }
    }, 1000);
  }
}
function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const ratio = timerSeconds / 600;
  document.getElementById('timer-display').style.color = ratio > 0.4 ? 'var(--accent)' : ratio > 0.15 ? '#f59e0b' : 'var(--s6)';
}

// ── NAVIGATION ──────────────────────────────────────────────────────────────
function goTo(idx) {
  current = idx;
  document.querySelectorAll('.station-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.s) === idx);
  });
  render();
  document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
  window.scrollTo({ top: 0 });
}

function toggleCard(card) {
  card.classList.toggle('open');
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  if (current === 0) { el.innerHTML = renderOverview(); return; }
  const s = STATIONS[current];
  el.innerHTML = renderStation(s);
}

function renderOverview() {
  return `
  <div class="station-header" style="animation:fadeUp 0.3s ease">
    <div class="station-tag" style="color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)">Pädagogik-Karussell · Prüfungsvorbereitung</div>
    <h1 class="station-title">Das Karussell</h1>
    <p class="station-subtitle">6 Stationen, kreisförmig verbunden. Je nach Einstiegsfrage beginnst du an einer anderen Station und läufst den Kreis durch.</p>
  </div>
  <div class="carousel-hint" style="margin-bottom:32px">
    <strong>Grundprinzip der kreisförmigen Argumentation</strong>
    Egal wo du einsteigst – du hast immer einen Übergang zur nächsten Station. So kannst du nach 10 Minuten zum Ausgangspunkt zurückkehren, ohne abgehackt zu wirken. Die Prüferin hört: strukturiertes, theoriegeleitetes Denken.
  </div>
  <div class="overview-grid">
    ${STATIONS.slice(1).map(s => `
    <div class="overview-card" onclick="goTo(${s.id})">
      <div class="ov-tag" style="color:${s.color}">
        <span class="ov-num" style="color:${s.color};border-color:${s.colorBorder};background:${s.colorDim}">${s.id}</span>
        ${s.tag.replace(/^[⑥⑤④③②①] /, '')}
      </div>
      <div class="ov-title">${s.title}</div>
      <div class="ov-authors">${s.theories.map(t => t.author).join(' · ')}</div>
    </div>`).join('')}
  </div>
  <div class="section">
    <div class="section-label">Einstiegsfragen → Station</div>
    <div class="table-wrap">
      <table class="info-table">
        <thead><tr><th>Prüfungsfrage</th><th>Einstieg bei</th></tr></thead>
        <tbody>
          <tr><td>„Was würden Sie zuerst zum Schüler sagen?" ⭐</td><td style="cursor:pointer;color:var(--s1)" onclick="goTo(1)">① Gesprächseinstieg</td></tr>
          <tr><td>„Welche Bedeutung hat die Lehrer-Schüler-Beziehung?"</td><td style="cursor:pointer;color:var(--s2)" onclick="goTo(2)">② Diagnose & Gespräch</td></tr>
          <tr><td>„Welche Rolle spielt die Klasse als Gruppe?"</td><td style="cursor:pointer;color:var(--s3)" onclick="goTo(3)">③ Klassendynamik</td></tr>
          <tr><td>„Was würden Sie im Unterricht konkret ändern?"</td><td style="cursor:pointer;color:var(--s4)" onclick="goTo(4)">④ Unterricht anpassen</td></tr>
          <tr><td>„Was ist das übergeordnete Ziel?" / „Was ist Bildung?"</td><td style="cursor:pointer;color:var(--s5)" onclick="goTo(5)">⑤ Mündigkeit & Werte</td></tr>
          <tr><td>„Wen würden Sie einbeziehen?" / „Wie reflektieren Sie?"</td><td style="cursor:pointer;color:var(--s6)" onclick="goTo(6)">⑥ System. Vernetzung</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="nav-footer">
    <button class="nav-arrow" disabled>← Zurück</button>
    <div class="nav-dots">${[0,1,2,3,4,5,6].map(i=>`<div class="nav-dot${i===0?' active':''}" onclick="goTo(${i})"></div>`).join('')}</div>
    <button class="nav-arrow" onclick="goTo(1)">① Einstieg →</button>
  </div>`;
}

function renderStation(s) {
  const badge = (t) => `
  <div class="theory-card" id="card-${s.id}-${t.author.replace(/\W/g,'')}">
    <div class="theory-card-header" onclick="toggleCard(this.parentElement)">
      <div class="theory-left">
        <div class="theorist-badge" style="color:${t.color};border-color:${t.colorBorder};background:${t.colorDim}">${t.author}</div>
        <div>
          <div class="theory-name">${t.name}</div>
          <div class="theory-key">${t.key}</div>
        </div>
      </div>
      <span class="toggle-icon">+</span>
    </div>
    <div class="theory-body">
      <ul>${t.points.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
  </div>`;

  let extra = '';

  // Station-specific extras
  if (s.rahmen) {
    extra += `<div class="section"><div class="section-label">Rahmenbedingungen</div><div class="table-wrap"><table class="info-table"><tbody>${s.rahmen.items.map(i=>`<tr><td>${i.label}</td><td>${i.desc}</td></tr>`).join('')}</tbody></table></div></div>`;
  }
  if (s.palzkill) {
    extra += `<div class="section"><div class="section-label">Musterverlauf A – Palzkill (Fördergespräch)</div><div class="steps">${s.palzkill.steps.map(st=>`<div class="step"><div class="step-num">${st.num}</div><div class="step-content"><div class="step-title">${st.title}</div><div class="step-desc">${st.desc}</div><div class="step-example">${st.example}</div></div></div>`).join('')}</div></div>`;
  }
  if (s.table) {
    extra += `<div class="section"><div class="section-label">${s.table.title}</div><div class="table-wrap"><table class="info-table"><thead><tr>${s.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${s.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
  }
  if (s.diagnoseFehler) {
    extra += `<div class="section"><div class="section-label">Typische Diagnosefehler – und Gegenmittel</div><div class="table-wrap"><table class="info-table"><tbody>${s.diagnoseFehler.map(f=>`<tr><td>${f.label}</td><td>${f.desc}</td></tr>`).join('')}</tbody></table></div></div>`;
  }
  if (s.lernsit) {
    extra += `<div class="section"><div class="section-label">Lernsituation vs. Leistungssituation</div><div class="quote-block"><blockquote>${s.lernsit}</blockquote></div></div>`;
  }
  if (s.proaktiv) {
    extra += `<div class="section"><div class="section-label">${s.proaktiv.title}</div><div class="table-wrap"><table class="info-table"><tbody>${s.proaktiv.items.map(i=>`<tr><td>${i.label}</td><td>${i.desc}</td></tr>`).join('')}</tbody></table></div></div>`;
  }
  if (s.kooperation) {
    extra += `<div class="section"><div class="section-label">Kooperationspartner einbeziehen</div><div class="table-wrap"><table class="info-table"><tbody>${s.kooperation.items.map(i=>`<tr><td>${i.label}</td><td>${i.desc}</td></tr>`).join('')}</tbody></table></div></div>`;
  }

  return `
  <div class="station-header">
    <div class="station-tag" style="color:${s.color};border-color:${s.colorBorder};background:${s.colorDim}">${s.tag}</div>
    <h1 class="station-title">${s.title}</h1>
    <p class="station-subtitle">${s.subtitle}</p>
  </div>
  <div class="einstieg-banner">
    <span class="icon">📌</span>
    <span>${s.einstieg}</span>
  </div>
  <div class="section">
    <div class="section-label">Theorien & Autoren – aufklappen für Details</div>
    <div class="theory-grid">${s.theories.map(t=>badge(t)).join('')}</div>
  </div>
  ${extra}
  <div class="section">
    <div class="section-label">Prüfungsformulierung – wörtlich einsetzbar</div>
    <div class="formulation">
      <div class="formulation-label">Muster-Antwort Station ${s.id}</div>
      <p>${s.formulation}</p>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Übergang zur nächsten Station</div>
    <div class="quote-block" style="border-left-color:${s.color}">
      <blockquote style="font-style:normal;font-family:'DM Mono',monospace;font-size:13px;color:${s.color}">${s.transitionTo}</blockquote>
    </div>
  </div>
  <div class="nav-footer">
    <button class="nav-arrow" onclick="goTo(${s.prev ?? 0})" ${s.prev == null ? 'disabled' : ''}>← ${s.prev != null ? 'Station ' + s.prev : 'Übersicht'}</button>
    <div class="nav-dots">${[0,1,2,3,4,5,6].map(i=>`<div class="nav-dot${i===current?' active':''}" onclick="goTo(${i})"></div>`).join('')}</div>
    <button class="nav-arrow" onclick="goTo(${s.next ?? 0})" ${s.next == null ? '' : ''}>
      ${s.next != null ? 'Station ' + s.next + ' →' : '↺ Übersicht →'}
    </button>
  </div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────
render();
document.querySelectorAll('.station-btn').forEach(b => {
  b.classList.toggle('active', parseInt(b.dataset.s) === 0);
});
</script>
</body>
